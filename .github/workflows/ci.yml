name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: "Test file"
        required: true
        default: "test_large.py"

      program_file:
        description: "Program file"
        required: true
        default: "app.py"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest

      - name: Run program
        run: python ${{ github.event.inputs.program_file }}

      - name: Run tests
        run: pytest ${{ github.event.inputs.test_file }} -v
